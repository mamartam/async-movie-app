<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./src/assets/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async movie app</title>
  </head>
  <body>
    <header class="header" id="header">
      <nav class="header__nav">
        <a class="header__logo" href="#header"
          ><img
            class="header__logo-img"
            src="./src/assets/logo.svg"
            alt="Movie app logo"
        /></a>
        <ul class="header__list">
          <li class="header__list-item"><a href="#">Movies</a></li>
          <li class="header__list-item"><a href="#">TV Shows</a></li>
          <li class="header__list-item"><a href="#">My Fav</a></li>
        </ul>
        <button class="header__burger">
          <span class="burger-span"></span>
          <span class="burger-span"></span>
          <span class="burger-span"></span>
        </button>
      </nav>
      <section class="header__search search">
        <form method="get" class="search__form">
          <label class="search-label visually-hidden" for="search-input"
            >Enter movie name...</label
          ><br />
          <input
            class="search-input"
            type="search"
            name="search-input"
            id="search-input"
            required
          />
          <button class="search-submit-btn" type="submit" aria-label="Search">
            <img
              src="./src/assets/search-btn-img.svg"
              alt="Search image"
              aria-hidden="true"
            />
          </button>
        </form>
      </section>
    </header>
    <main class="main"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
